name: CI Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Rodar testes
        run: mvn test